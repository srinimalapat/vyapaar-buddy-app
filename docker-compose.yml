version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: vyapaar-buddy-postgres
    environment:
      POSTGRES_DB: vyapaar_buddy
      POSTGRES_USER: vyapaar_user
      POSTGRES_PASSWORD: vyapaar_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vyapaar_user -d vyapaar_buddy"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
