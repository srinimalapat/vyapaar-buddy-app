spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/vyapaar_buddy}
    username: ${SPRING_DATASOURCE_USERNAME:vyapaar_user}
    password: ${SPRING_DATASOURCE_PASSWORD:vyapaar_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  h2:
    console:
      enabled: false

logging:
  level:
    com.vyapaarbuddy: INFO
    org.springframework.security: WARN
    org.hibernate: WARN
