spring:
  flyway:
    enabled: false

  datasource:
    url: jdbc:h2:mem:vyapaarbuddy-test;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: false

logging:
  level:
    com.vyapaarbuddy: INFO
    org.springframework.security: WARN
    org.hibernate: WARN
