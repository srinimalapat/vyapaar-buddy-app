spring:
  application:
    name: vyapaar-buddy
  profiles:
    active: dev

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:vyapaarbuddy}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:VyapaarBuddySecretKeyForJWTSigning2024MustBe32CharsMin}
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    com.vyapaarbuddy: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  whatsapp:
    mode: ${WHATSAPP_MODE:MANUAL}
    cloud-api:
      enabled: ${WHATSAPP_CLOUD_API_ENABLED:false}
      base-url: https://graph.facebook.com
      api-version: v19.0
      phone-number-id: ${WHATSAPP_PHONE_NUMBER_ID:}
      access-token: ${WHATSAPP_ACCESS_TOKEN:}
      webhook-verify-token: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN:changeme}
      business-account-id: ${WHATSAPP_BUSINESS_ACCOUNT_ID:}
    webhook:
      auto-execute-commands: ${WHATSAPP_AUTO_EXECUTE:false}
