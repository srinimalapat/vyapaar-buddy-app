spring:
  flyway:
    enabled: false

  datasource:
    url: jdbc:h2:mem:vyapaarbuddy-dev
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    com.vyapaarbuddy: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
